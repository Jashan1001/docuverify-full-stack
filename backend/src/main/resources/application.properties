# ===========================
# DocuVerify Application Config
# ===========================

# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/docuverify}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Rate Limiting
rate.limit.requests=100
rate.limit.window-seconds=60

# ===========================
# Local File Storage
# ===========================
storage.mode=local
storage.local.upload-dir=./uploads

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Seeder — default admin account
# Created on first boot if no admin exists
# ===========================
seeder.admin.email=admin@docuverify.com
seeder.admin.password=${SEEDER_ADMIN_PASSWORD:}
seeder.admin.fullName=Platform Admin
seeder.institution.name=Default Institution
seeder.institution.domain=docuverify.com
seeder.institution.contact=admin@docuverify.com

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.docuverify=INFO
logging.level.org.springframework.security=WARN
