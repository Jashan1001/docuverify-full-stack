# ===========================
# Server
# ===========================
server.port=${PORT:8080}

# ===========================
# PostgreSQL (Render)
# ===========================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP tuning)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# Disable Redis (Render has no Redis by default)
# ===========================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# ===========================
# JWT
# ===========================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# ===========================
# Rate Limiting
# ===========================
rate.limit.requests=100
rate.limit.window-seconds=60

# ===========================
# Storage (TEMP: local only)
# ⚠️ Files will be lost on redeploy
# ===========================
storage.mode=${STORAGE_MODE:local}
storage.local.upload-dir=${UPLOAD_DIR:/tmp/uploads}

# ===========================
# AWS S3 (only if enabled later)
# ===========================
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_REGION}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}

# ===========================
# File Upload Limits
# ===========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Email (SMTP - Brevo or others)
# ===========================
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Async email threads
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# ===========================
# Seeder (Initial Admin)
# ===========================
seeder.admin.email=${ADMIN_EMAIL:admin@docuverify.com}
seeder.admin.password=${SEEDER_ADMIN_PASSWORD}
seeder.admin.fullName=Platform Admin

seeder.institution.name=Default Institution
seeder.institution.domain=docuverify.com
seeder.institution.contact=admin@docuverify.com

# ===========================
# App URLs
# ===========================
app.frontend-url=${FRONTEND_URL}

# ===========================
# CORS
# ===========================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ===========================
# Logging
# ===========================
logging.level.com.docuverify=INFO
logging.level.org.springframework.security=WARN
server.address=0.0.0.0