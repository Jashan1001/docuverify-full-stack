# ===========================
# DocuVerify Application Config
# ===========================

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/docuverify
spring.datasource.username=postgres
spring.datasource.password=jashanadmin1001
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Rate Limiting
rate.limit.requests=100
rate.limit.window-seconds=60

# ===========================
# Local File Storage (default)
# Set storage.mode=s3 to use AWS S3 instead
# ===========================
storage.mode=local
storage.local.upload-dir=./uploads

# AWS S3 (only used when storage.mode=s3)
aws.s3.bucket=docuverify-documents
aws.s3.region=ap-south-1
aws.access-key=YOUR_ACCESS_KEY
aws.secret-key=YOUR_SECRET_KEY

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Seeder — default admin account
# Created on first boot if no admin exists
# ===========================
seeder.admin.email=admin@docuverify.com
seeder.admin.password=Admin@123456
seeder.admin.fullName=Platform Admin
seeder.institution.name=Default Institution
seeder.institution.domain=docuverify.com
seeder.institution.contact=admin@docuverify.com

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.docuverify=INFO
logging.level.org.springframework.security=WARN
