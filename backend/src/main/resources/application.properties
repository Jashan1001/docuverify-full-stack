# ===========================
# DocuVerify Application Config
# ===========================

# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/docuverify}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# JWT
jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Rate Limiting
rate.limit.requests=100
rate.limit.window-seconds=60

# Storage
storage.mode=local
storage.local.upload-dir=./uploads

# AWS S3 (only used when storage.mode=s3)
aws.s3.bucket=${AWS_S3_BUCKET:docuverify-documents}
aws.s3.region=${AWS_REGION:ap-south-1}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Email (SMTP)
# Uses Brevo free tier by default — 300 emails/day free
# Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD via env vars
# ===========================
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Async support for email
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# ===========================
# Seeder
# ===========================
seeder.admin.email=admin@docuverify.com
seeder.admin.password=${SEEDER_ADMIN_PASSWORD:ChangeMe@123}
seeder.admin.fullName=Platform Admin
seeder.institution.name=Default Institution
seeder.institution.domain=docuverify.com
seeder.institution.contact=admin@docuverify.com

# App URLs
app.frontend-url=${FRONTEND_URL:https://docuverify-platform.vercel.app}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://docuverify-platform.vercel.app,http://localhost:5173}

# Logging
logging.level.com.docuverify=INFO
logging.level.org.springframework.security=WARN