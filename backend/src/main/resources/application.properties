# ===========================
# DocuVerify Application Config
# ===========================

# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/docuverify}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# JWT
jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Rate Limiting
rate.limit.requests=100
rate.limit.window-seconds=60

# ===========================
# Local File Storage (default)
# Set storage.mode=s3 to use AWS S3 instead
# ===========================
storage.mode=local
storage.local.upload-dir=./uploads

# AWS S3 (only used when storage.mode=s3)
aws.s3.bucket=${AWS_S3_BUCKET:docuverify-documents}
aws.s3.region=${AWS_REGION:ap-south-1}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Seeder — default admin account
# Created on first boot if no admin exists
# ===========================
seeder.admin.email=admin@docuverify.com
seeder.admin.password=${SEEDER_ADMIN_PASSWORD:ChangeMe@123}
seeder.admin.fullName=Platform Admin
seeder.institution.name=Default Institution
seeder.institution.domain=docuverify.com
seeder.institution.contact=admin@docuverify.com

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.docuverify=INFO
logging.level.org.springframework.security=WARN
