# Copy to application.properties for local overrides (or set as environment variables)

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/docuverify
spring.datasource.username=postgres
spring.datasource.password=YOUR_DB_PASSWORD

jwt.secret=YOUR_BASE64_32BYTE_SECRET
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

seeder.admin.email=admin@docuverify.com
seeder.admin.password=CHANGE_THIS_IN_PRODUCTION
seeder.admin.fullName=Platform Admin
seeder.institution.name=Default Institution
seeder.institution.domain=docuverify.com
seeder.institution.contact=admin@docuverify.com

cors.allowed-origins=http://localhost:5173,http://localhost:3000

aws.s3.bucket=docuverify-documents
aws.s3.region=ap-south-1
aws.access-key=
aws.secret-key=
